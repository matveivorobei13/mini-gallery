<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Create Post</title>
</head>
<body>
    <main class="upload_main">
        <h1 class="creating_title">Create a New Post</h1>
        <form action="/posts" method="post" enctype="multipart/form-data", class="upload_form">
            <div>
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required>
            </div>
            <div>
                <label for="content">Content</label>
                <textarea id="content" name="description" rows="6" required></textarea>
            </div>
            <div>
                <label for="image">Image</label>
                <input type="file" id="image" name="image" accept="image/*">
            </div>
            <button type="submit">Create Post</button>
        </form>
    </main>
    <script>
        const form = document.querySelector(".upload_form")
        form.addEventListener("submit", async function(e){
             e.preventDefault();

            const formData = new FormData(form);

            const data = Object.fromEntries(formData.entries());

            console.log(data);

            const response = await fetch("http://localhost:3000/upload", {
                method: "POST",
                body: formData
            })
            const upload_data = await response.json()
            alert(upload_data.message)

        })
    </script>
</body>
</html>
